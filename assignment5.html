<html>
    <head>
        <title>IT CONSULTANT APPLICATION FORM</title>
        <link rel="shortcut icon" href="icon/question mark.png">
    </head>
    <body>
        
        <h1>IT CONSULTANT APPLICATION FORM</h1>
        <p><i> Please make sure you fill out the form below*</i></p>
        <form>
            <fieldset>
                <legend>CONTACT DETAILS</legend>
                <input type="text" placeholder="Enter name"> <br> <br>
                <input type="tel" placeholder="Enter telephone number"> <br> <br>
                <input type="email" placeholder="Enter Email">
            </fieldset>
            <!-- end of fieldset 1-->
            <fieldset>
                <legend>PERSONAL DETAILS</legend> <br>
                <input type="number" placeholder="Your Age"> <br> <br>

                <label>Gender</label> <br>
                <select>
                    <option value="1">Male</option>
                    <option value="2">Female</option> 
                </select> <br> <br>

                <label>What gave you the motivation to apply</label> <br>
                <textarea cols="50" rows="7"></textarea>
            </fieldset>
            <!-- end of fieldset 2-->
            <fieldset>
                <legend>PICK YOUR FAVOURITE LANGUAGE</legend> <br>
                JAVA<input type="checkbox"> &nbsp;
                HTML<input type="checkbox"> &nbsp;
                SQL<input type="checkbox"> <br>
            </fieldset>

            <input type="submit">
        </form>
    </body>
</html>
